<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>晨间恢复卡</title><style> *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; } :root { --bg: #0f172a; --card: #1e293b; --card-border: #334155; --text: #f1f5f9; --text-dim: #94a3b8; --text-dark: #64748b; --excellent: #22c55e; --good: #3b82f6; --caution: #eab308; --poor: #f97316; --critical: #ef4444; --dim-hrv: #a78bfa; --dim-rhr: #22d3ee; --dim-sleep: #34d399; --dim-readiness: #f87171; --dim-stress: #fbbf24; } body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased; } .container { max-width: 420px; margin: 0 auto; padding: 12px; padding-bottom: 80px; } /* Header */ .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; margin-bottom: 12px; border-bottom: 1px solid var(--card-border); } .header-date { font-size: 14px; font-weight: 600; } .header-meta { font-size: 11px; color: var(--text-dim); text-align: right; } .refresh-btn { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px 8px; transition: transform 0.2s; } .refresh-btn:active { transform: rotate(180deg); } /* Hero Score */ .hero { text-align: center; padding: 32px 16px; background: var(--card); border-radius: 20px; border: 1px solid var(--card-border); margin-bottom: 12px; position: relative; overflow: hidden; } .hero::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at center, var(--accent-glow, rgba(234,179,8,0.1)) 0%, transparent 70%); pointer-events: none; } .score-ring { width: 120px; height: 120px; margin: 0 auto 12px; position: relative; } .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); } .score-ring-bg { fill: none; stroke: var(--card-border); stroke-width: 8; } .score-ring-fill { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1); } .score-value { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(0deg); } .score-number { font-size: 42px; font-weight: 800; line-height: 1; color: var(--accent, var(--caution)); } .grade-badge { display: inline-block; padding: 4px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-top: 8px; background: var(--accent-alpha, rgba(234,179,8,0.15)); color: var(--accent, var(--caution)); border: 1px solid var(--accent-border, rgba(234,179,8,0.3)); } /* Metric Cards */ .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; } .metric-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px; } .metric-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; } .metric-info { flex: 1; min-width: 0; } .metric-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; } .metric-value { font-size: 20px; font-weight: 700; font-family: 'SF Mono', Menlo, monospace; } .metric-unit { font-size: 11px; color: var(--text-dim); font-weight: 400; margin-left: 2px; } .metric-bar { height: 4px; background: var(--card-border); border-radius: 2px; margin-top: 6px; overflow: hidden; } .metric-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; } .metric-trend { font-size: 10px; margin-top: 2px; display: flex; align-items: center; gap: 3px; } /* Full-width card for sleep */ .metric-card.wide { grid-column: 1 / -1; } /* Summary Section */ .summary-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 16px; margin-bottom: 12px; } .summary-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; } .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.4); } .summary-row:last-child { border-bottom: none; } .summary-label { font-size: 13px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; } .summary-value { font-size: 14px; font-weight: 600; font-family: 'SF Mono', Menlo, monospace; } .summary-value.good { color: var(--excellent); } .summary-value.warn { color: var(--caution); } .summary-value.bad { color: var(--critical); } /* Advice Card */ .advice-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 14px; padding: 16px; margin-bottom: 12px; } .advice-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; } .advice-text { font-size: 14px; line-height: 1.6; color: var(--text); } .advice-text strong { color: var(--accent, var(--caution)); font-weight: 600; } .advice-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.3); } .advice-item:last-child { border-bottom: none; } .advice-icon { font-size: 18px; flex-shrink: 0; } .advice-content { flex: 1; font-size: 13px; line-height: 1.5; } /* Status Chips */ .chips-row { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 8px; scrollbar-width: none; margin-bottom: 12px; } .chips-row::-webkit-scrollbar { display: none; } .chip { flex-shrink: 0; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; background: var(--card); border: 1px solid var(--card-border); color: var(--text-dim); display: flex; align-items: center; gap: 6px; } .chip.ok { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--excellent); } .chip.warn { background: rgba(234,179,8,0.1); border-color: rgba(234,179,8,0.3); color: var(--caution); } /* Alert */ .alert-bar { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--critical); } .alert-bar.ok { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--excellent); } /* Raw Data Toggle */ .raw-toggle { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--card-border); padding: 10px 16px; z-index: 100; } .raw-toggle-btn { width: 100%; padding: 10px; background: var(--card-border); border: none; border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; } .raw-content { display: none; margin-bottom: 12px; } .raw-content.show { display: block; } .raw-content pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; font-size: 10px; line-height: 1.5; overflow-x: auto; color: var(--text-dim); font-family: 'SF Mono', Menlo, monospace; max-height: 300px; overflow-y: auto; } /* Loading */ .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); } .spinner { width: 32px; height: 32px; border: 3px solid var(--card-border); border-top-color: var(--caution); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; } @keyframes spin { to { transform: rotate(360deg); } } .hidden { display: none !important; } /* Progress bar animation */ @keyframes fillBar { from { width: 0; } } .metric-bar-fill { animation: fillBar 1s ease-out; } /* Responsive: wider screens keep phone ratio */ @media (min-width: 420px) { .container { padding: 16px; } }

  /* 固定失败页（对齐标准版：失败不回退内嵌旧数据） */
  .fail-screen { text-align: center; padding: 56px 24px; color: var(--text); max-width: 360px; margin: 0 auto; }
  .fail-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(239,68,68,0.15); color: var(--critical); font-size: 28px; font-weight: 800; line-height: 48px; margin: 0 auto 16px; border: 1px solid rgba(239,68,68,0.3); }
  .fail-screen h2 { font-size: 18px; margin-bottom: 12px; }
  .fail-reason { color: var(--critical); font-size: 13px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; word-break: break-all; }
  .fail-hint { color: var(--text-dim); font-size: 12px; line-height: 1.6; }
  .fail-hint code { background: rgba(0,0,0,0.25); padding: 1px 6px; border-radius: 6px; font-family: 'SF Mono', Menlo, monospace; }

</style></head><body data-style="morning-card">
<div class="container">
<div id="loading" class="loading">
<div class="spinner"></div>
<p>加载中...</p>
</div>
<div id="app" class="hidden">
<!-- Header -->
<div class="header">
<div>
<div class="header-date" id="dateDisplay">--</div>
<div class="header-meta" id="deviceMeta">--</div>
</div><button class="refresh-btn" onclick="loadData()" title="刷新"></button></div>
<!-- Hero Score -->
<div class="hero" id="heroCard">
<div class="score-ring"><svg viewBox="0 0 120 120"><circle class="score-ring-bg" cx="60" cy="60" r="52"/><circle class="score-ring-fill" id="heroRing" cx="60" cy="60" r="52" stroke="var(--accent, var(--caution))" stroke-dasharray="326.7" stroke-dashoffset="326.7"/></svg>
<div class="score-value">
<div class="score-number" id="scoreNum">--</div>
</div></div>
<div class="grade-badge" id="gradeBadge">--</div>
</div>
<!-- Status Chips -->
<div class="chips-row" id="chipsRow"></div>
<!-- Alert -->
<div class="alert-bar ok" id="alertBar"><span id="alertIcon"></span><span id="alertText">趋势正常</span></div>
<!-- Sleep Metrics -->
<div class="metrics-grid">
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">睡眠</div>
<div class="metric-value" id="sleepTotal">--<span class="metric-unit">h</span></div>
<div class="metric-bar">
<div class="metric-bar-fill" id="sleepBar" style="width:0%;background:var(--dim-sleep);"></div>
</div></div>
</div>
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">深睡</div>
<div class="metric-value" id="deepPct">--<span class="metric-unit">%</span></div>
<div class="metric-bar">
<div class="metric-bar-fill" id="deepBar" style="width:0%;background:var(--dim-sleep);"></div>
</div></div>
</div>
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">HRV</div>
<div class="metric-value" id="hrvValue">--<span class="metric-unit">ms</span></div>
<div class="metric-trend" id="hrvTrend">--</div>
</div></div>
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">静息心率</div>
<div class="metric-value" id="rhrValue">--<span class="metric-unit">bpm</span></div>
<div class="metric-trend" id="rhrTrend">--</div>
</div></div>
</div>
<!-- Body Battery & Stress -->
<div class="metrics-grid">
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">压力</div>
<div class="metric-value" id="stressValue">--<span class="metric-unit">/100</span></div>
<div class="metric-bar">
<div class="metric-bar-fill" id="stressBar" style="width:0%;background:var(--dim-stress);"></div>
</div></div>
</div>
<div class="metric-card">
<div class="metric-icon"></div>
<div class="metric-info">
<div class="metric-label">训练准备度</div>
<div class="metric-value" id="readyValue">--<span class="metric-unit">/100</span></div>
<div class="metric-trend" id="readyTrend">--</div>
</div></div>
</div>
<!-- Plain-language Summary -->
<div class="summary-card">
<div class="summary-title"> 今日解读</div>
<div id="summaryText" style="font-size:13px;line-height:1.7;color:var(--text-dim);"> 加载中... </div>
</div>
<!-- Advice -->
<div class="advice-card">
<div class="advice-title"> 今日建议</div>
<div id="adviceContent">
<div class="advice-item">
<div class="advice-content" id="adviceType">--</div>
</div>
<div class="advice-item">
<div class="advice-content" id="adviceDuration">--</div>
</div>
<div class="advice-item">
<div class="advice-content" id="adviceIntensity">--</div>
</div></div>
</div>
<!-- Raw Data Toggle --><button class="raw-toggle" id="rawToggle" onclick="toggleRaw()"> 查看原始数据 </button>
<div class="raw-content" id="rawContent">
<pre id="rawPre"></pre></div>
</div></div>
<script>
/* ─── Color Helpers ─── */
const GRADE_COLORS = { 'A': { color: '#22c55e', glow: 'rgba(34,197,94,0.15)', border: 'rgba(34,197,94,0.3)', label: '状态极佳' }, 'B': { color: '#3b82f6', glow: 'rgba(59,130,246,0.15)', border: 'rgba(59,130,246,0.3)', label: '状态良好' }, 'C': { color: '#eab308', glow: 'rgba(234,179,8,0.15)', border: 'rgba(234,179,8,0.3)', label: '需要注意' }, 'D': { color: '#f97316', glow: 'rgba(249,115,22,0.15)', border: 'rgba(249,115,22,0.3)', label: '恢复不足' }, 'F': { color: '#ef4444', glow: 'rgba(239,68,68,0.15)', border: 'rgba(239,68,68,0.3)', label: '需要休息' } };
const CIRCUMFERENCE = 2 * Math.PI * 52;
let rawVisible = false;
function formatHours(seconds) { if (!seconds && seconds !== 0) return '--'; return (seconds / 3600).toFixed(1); }
function formatBpm(val) { if (val === null || val === undefined) return '--'; return String(val); }
function getGradeInfo(grade) { return GRADE_COLORS[grade] || GRADE_COLORS['C']; }
function animateRing(el, score) { const target = CIRCUMFERENCE - (CIRCUMFERENCE * Math.min(score, 100) / 100); el.style.strokeDashoffset = CIRCUMFERENCE; requestAnimationFrame(() => { requestAnimationFrame(() => { el.style.strokeDashoffset = target; }); }); }

const STATIC_DATA = {};  // 占位：由 build.py 注入完整 kpi_today.json

function render(data, mode) {
  const root = document.documentElement;
  const gc = getGradeInfo(data.composite?.grade);
  const ds = data.dimension_scores || {};
  const derived = data.derived_metrics_summary || {};
  const trend = data.trend || {};
  const patterns = data.multi_dimension_validation?.patterns_checked || [];
  root.style.setProperty('--accent', gc.color);
  root.style.setProperty('--accent-glow', gc.glow);
  root.style.setProperty('--accent-border', gc.border);
  root.style.setProperty('--accent-alpha', gc.glow);

  document.getElementById('dateDisplay').textContent = data.date || '--';
  const profile = data.raw_inputs?.profile || {};
  const device = profile.device || data.data_source || '--';
  document.getElementById('deviceMeta').textContent = device + (mode === 'static' ? ' · 静态快照' : '');

  const score = data.composite?.recovery_score ?? '--';
  document.getElementById('scoreNum').textContent = score;
  const gradeBadge = document.getElementById('gradeBadge');
  gradeBadge.textContent = gc.label;
  gradeBadge.style.background = gc.glow;
  gradeBadge.style.color = gc.color;
  gradeBadge.style.border = `1px solid ${gc.border}`;
  animateRing(document.getElementById('heroRing'), score);

  const sleepSec = ds.sleep?.total_seconds || data.raw_inputs?.sleep?.total_seconds || 0;
  document.getElementById('sleepTotal').innerHTML = `${formatHours(sleepSec)}<span class="metric-unit">h</span>`;
  const deepPct = ds.sleep?.deep_pct || derived.sleep_deep_pct || (data.raw_inputs?.sleep?.deep_seconds && sleepSec ? (data.raw_inputs.sleep.deep_seconds / sleepSec * 100) : 0);
  document.getElementById('deepPct').innerHTML = `${deepPct ? deepPct.toFixed(0) : '--'}%`;
  document.getElementById('sleepBar').style.width = `${Math.min(100, (sleepSec / 3600 / 9) * 100)}%`;
  document.getElementById('deepBar').style.width = `${Math.min(100, deepPct * 2)}%`;

  const hrvVal = ds.hrv?.last_night_ms || data.raw_inputs?.hrv?.last_night || '--';
  document.getElementById('hrvValue').innerHTML = `${hrvVal}<span class="metric-unit">ms</span>`;
  const hrvPct = derived.hrv_pct_change;
  const hrvTrend = document.getElementById('hrvTrend');
  if (hrvPct > 0) { hrvTrend.innerHTML = `<span style="color:var(--excellent);">&#x2191; ${Math.abs(hrvPct).toFixed(1)}%</span>`; }
  else if (hrvPct < 0) { hrvTrend.innerHTML = `<span style="color:var(--critical);">&#x2193; ${Math.abs(hrvPct).toFixed(1)}%</span>`; }
  else { hrvTrend.textContent = '--'; }

  const rhrVal = ds.rhr?.current_bpm || data.raw_inputs?.rhr?.current_bpm || '--';
  document.getElementById('rhrValue').innerHTML = `${rhrVal}<span class="metric-unit">bpm</span>`;
  const rhrDev = derived.rhr_deviation_bpm;
  const rhrTrend = document.getElementById('rhrTrend');
  if (rhrDev < 0) { rhrTrend.innerHTML = `<span style="color:var(--excellent);">&#x2191; ${Math.abs(rhrDev)} bpm (偏低=恢复好)</span>`; }
  else if (rhrDev > 0) { rhrTrend.innerHTML = `<span style="color:var(--critical);">&#x2193; +${rhrDev} bpm</span>`; }
  else { rhrTrend.textContent = '基线水平'; }

  const stressLevel = ds.stress?.stress_level || derived.stress_level || '--';
  document.getElementById('stressValue').innerHTML = `${stressLevel}<span class="metric-unit">/100</span>`;
  const stressBar = document.getElementById('stressBar');
  if (typeof stressLevel === 'number') {
    stressBar.style.width = `${stressLevel}%`;
    if (stressLevel < 30) stressBar.style.background = 'var(--excellent)';
    else if (stressLevel < 60) stressBar.style.background = 'var(--caution)';
    else stressBar.style.background = 'var(--critical)';
  }

  const readyScore = ds.readiness?.score || derived.readiness_score_original || '--';
  document.getElementById('readyValue').innerHTML = `${readyScore}<span class="metric-unit">/100</span>`;
  const readyTrend = document.getElementById('readyTrend');
  if (readyScore >= 80) { readyTrend.innerHTML = `<span style="color:var(--excellent);"> 适合训练</span>`; }
  else if (readyScore >= 60) { readyTrend.innerHTML = `<span style="color:var(--caution);"> 中等强度</span>`; }
  else { readyTrend.innerHTML = `<span style="color:var(--critical);"> 建议休息</span>`; }

  const summaryParts = [];
  if (hrvPct > 5) { summaryParts.push(`HRV <strong>高于</strong> 基线 ${Math.abs(hrvPct).toFixed(1)}%，神经系统恢复良好。`); }
  else if (hrvPct < -5) { summaryParts.push(`HRV <strong>低于</strong> 基线 ${Math.abs(hrvPct).toFixed(1)}%，可能仍有疲劳。`); }
  else { summaryParts.push(`HRV 接近基线水平，恢复状态一般。`); }
  if (rhrDev < -2) { summaryParts.push(`静息心率 <strong>低于</strong> 基线 ${Math.abs(rhrDev)} bpm，副交感神经占优，是恢复良好的信号。`); }
  else if (rhrDev > 2) { summaryParts.push(`静息心率 <strong>高于</strong> 基线 ${rhrDev} bpm，可能积累疲劳。`); }
  const sleepH = sleepSec / 3600;
  if (sleepH >= 7) { summaryParts.push(`睡眠 <strong>充足</strong>（${sleepH.toFixed(1)} 小时），深睡占比 ${deepPct ? deepPct.toFixed(0) : '--'}%。`); }
  else if (sleepH >= 6) { summaryParts.push(`睡眠 <strong>略短</strong>（${sleepH.toFixed(1)} 小时），建议尽量睡满 7 小时。`); }
  else { summaryParts.push(`睡眠 <strong>不足</strong>（${sleepH.toFixed(1)} 小时），恢复会受影响。`); }
  if (typeof stressLevel === 'number' && stressLevel > 50) { summaryParts.push(`压力水平 <strong>偏高</strong>（${stressLevel}/100），注意放松。`); }
  document.getElementById('summaryText').innerHTML = summaryParts.join('<br><br>');

  const grade = data.composite?.grade || 'C';
  let typeText, durText, intText;
  if (grade === 'A' || grade === 'B') { typeText = '可以进行 <strong>正常训练</strong>，状态良好。'; durText = '建议训练时长：<strong>45-60 分钟</strong>。'; intText = '可以尝试 <strong>中等强度</strong>（心率区间 2-3）。'; }
  else if (grade === 'C') { typeText = '建议 <strong>低强度有氧</strong> 或 <strong>主动恢复</strong>。'; durText = '建议训练时长：<strong>30 分钟以内</strong>，或做瑜伽/拉伸。'; intText = '保持 <strong>低强度</strong>（心率区间 1），避免冲刺。'; }
  else { typeText = '建议 <strong>休息或极低强度活动</strong>。'; durText = '今天 <strong>不建议训练</strong>，让身体充分恢复。'; intText = '如果必须动，只能是 <strong>散步</strong>（10-15 分钟）。'; }
  document.getElementById('adviceType').innerHTML = typeText;
  document.getElementById('adviceDuration').innerHTML = durText;
  document.getElementById('adviceIntensity').innerHTML = intText;

  const chipsRow = document.getElementById('chipsRow');
  chipsRow.innerHTML = patterns.map(p => { const cls = p.match ? 'chip ok' : 'chip warn'; const icon = p.match ? '' : ''; return `<div class="${cls}">${icon} ${p.label}</div>`; }).join('');

  const alertBar = document.getElementById('alertBar');
  if (trend.alert) { alertBar.classList.remove('ok'); alertBar.style.background = 'rgba(239,68,68,0.1)'; alertBar.style.borderColor = 'rgba(239,68,68,0.3)'; document.getElementById('alertIcon').textContent = ''; document.getElementById('alertText').textContent = trend.alert; }
  else { alertBar.classList.add('ok'); alertBar.style.background = 'rgba(34,197,94,0.1)'; alertBar.style.borderColor = 'rgba(34,197,94,0.3)'; document.getElementById('alertIcon').textContent = ''; document.getElementById('alertText').textContent = '近 28 天恢复状态稳定'; }

  document.getElementById('rawPre').textContent = JSON.stringify(data, null, 2);
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function showFailure(reason) {
  const loading = document.getElementById('loading');
  loading.classList.remove('hidden');
  loading.innerHTML = `
    <div class="fail-screen">
      <div class="fail-icon">!</div>
      <h2>报告加载失败</h2>
      <p class="fail-reason">${reason}</p>
      <p class="fail-hint">请通过本地 HTTP 服务访问本页（如 <code>python -m http.server</code>），以读取最新的 kpi_today.json。离线静态快照不可用。</p>
    </div>`;
}

function toggleRaw() { rawVisible = !rawVisible; const content = document.getElementById('rawContent'); const btn = document.getElementById('rawToggle'); if (rawVisible) { content.classList.add('show'); btn.innerHTML = '&#x2191; 收起原始数据'; } else { content.classList.remove('show'); btn.innerHTML = ' 查看原始数据'; } }

function getDataUrl() { const params = new URLSearchParams(window.location.search); const date = params.get('date'); if (date) return `../kpi_${date}.json`; return '../kpi_today.json'; }

async function loadData() {
  const loading = document.getElementById('loading');
  const app = document.getElementById('app');
  loading.classList.remove('hidden');
  app.classList.add('hidden');
  loading.innerHTML = '<div class="spinner"></div><p>加载中...</p>';

  if (window.location.protocol === 'file:') {
    render(STATIC_DATA, 'static');
    loading.classList.add('hidden');
    app.classList.remove('hidden');
    return;
  }
  try {
    const resp = await fetch(getDataUrl(), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    if (!resp.headers.get('content-type') || !resp.headers.get('content-type').includes('json')) throw new Error('返回内容不是 JSON');
    const data = await resp.json();
    if (!data || !data.composite) throw new Error('数据缺少 composite 字段（不是标准 kpi_today.json）');
    render(data, 'live');
    loading.classList.add('hidden');
    app.classList.remove('hidden');
  } catch (err) {
    showFailure(err.message);
  }
}
document.addEventListener('DOMContentLoaded', loadData);
</script></body></html>
